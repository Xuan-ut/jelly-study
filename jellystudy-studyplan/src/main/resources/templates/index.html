<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习计划 - JellyStudy</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f88eb 0%, #1890ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .plan-card {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }
        .plan-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .plan-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .plan-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .plan-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-active {
            background: #e6f4ff;
            color: #1890ff;
        }
        .status-completed {
            background: #f6ffed;
            color: #52c41a;
        }
        .stage-list {
            margin-top: 16px;
        }
        .stage-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #fafafa;
            border-radius: var(--radius-md);
            margin-bottom: 8px;
        }
        .stage-progress {
            flex: 1;
            margin-left: 12px;
        }
        .stage-name {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .progress-bar {
            height: 6px;
            background: #e8e8e8;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0f88eb 0%, #1890ff 100%);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-item {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #0f88eb;
        }
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        .ai-recommendation {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-top: 16px;
        }
        .ai-recommendation h4 {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ai-recommendation p {
            line-height: 1.6;
            opacity: 0.95;
        }
        .guest-banner {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
            padding: 16px 24px;
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .guest-banner .btn {
            background: white;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <a href="/" class="logo">JellyStudy</a>
            <div class="nav">
                <a href="/" class="active">学习计划</a>
                <a href="/plans">我的计划</a>
                <a href="/progress">学习进度</a>
                <div class="user-info" id="user-info" style="display: none;">
                    <div class="user-avatar" id="user-avatar">U</div>
                    <span id="user-name">用户</span>
                    <button class="btn btn-sm btn-secondary" onclick="logout()">退出</button>
                </div>
                <button class="btn btn-primary" id="login-btn" onclick="showLoginModal()">登录</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="guest-banner" id="guest-banner" style="display: none;">
            <div>
                <strong>游客模式</strong> - 注册账号可保存您的学习进度
            </div>
            <button class="btn" onclick="showRegisterModal()">立即注册</button>
        </div>

        <div class="stats-grid" id="stats-section">
            <div class="stat-item">
                <div class="stat-value" id="stat-plans">0</div>
                <div class="stat-label">学习计划</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-progress">0%</div>
                <div class="stat-label">平均进度</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-stages">0</div>
                <div class="stat-label">学习阶段</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-time">0h</div>
                <div class="stat-label">学习时长</div>
            </div>
        </div>

        <div class="grid-layout">
            <div class="main-content">
                <div class="card">
                    <div class="card-header">
                        我的学习计划
                        <button class="btn btn-primary btn-sm" style="margin-left: auto;" onclick="showCreatePlanModal()">+ 新建计划</button>
                    </div>
                    <div class="card-body" id="plans-container">
                        <p style="text-align: center; color: #999; padding: 40px;">请先登录查看您的学习计划</p>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-card">
                    <div class="card-header">Nacos 配置</div>
                    <div class="card-body" id="nacos-config">
                        <p style="color: #999;">加载中...</p>
                    </div>
                </div>

                <div class="sidebar-card">
                    <div class="card-header">快速操作</div>
                    <div class="card-body">
                        <button class="btn btn-secondary" style="width: 100%; margin-bottom: 8px;" onclick="showCreatePlanModal()">创建学习计划</button>
                        <button class="btn btn-secondary" style="width: 100%; margin-bottom: 8px;" onclick="refreshPlans()">刷新数据</button>
                        <button class="btn btn-secondary" style="width: 100%;" onclick="guestLogin()">游客登录</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <p>© 2026 JellyStudy. 学习计划与进度追踪模块</p>
        </div>
    </div>

    <div class="modal" id="login-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>用户登录</h3>
                <button class="modal-close" onclick="closeModal('login-modal')">&times;</button>
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
                <p style="text-align: center; margin-top: 16px; color: #666;">
                    还没有账号？<a href="#" onclick="showRegisterModal()">立即注册</a>
                </p>
            </form>
        </div>
    </div>

    <div class="modal" id="register-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>用户注册</h3>
                <button class="modal-close" onclick="closeModal('register-modal')">&times;</button>
            </div>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="reg-username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="reg-password" required placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="reg-nickname" placeholder="请输入昵称（可选）">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">注册</button>
            </form>
        </div>
    </div>

    <div class="modal" id="create-plan-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建学习计划</h3>
                <button class="modal-close" onclick="closeModal('create-plan-modal')">&times;</button>
            </div>
            <form onsubmit="handleCreatePlan(event)">
                <div class="form-group">
                    <label>计划标题</label>
                    <input type="text" id="plan-title" required placeholder="例如：Java学习计划">
                </div>
                <div class="form-group">
                    <label>计划描述</label>
                    <textarea id="plan-description" placeholder="描述您的学习目标"></textarea>
                </div>
                <div class="form-group">
                    <label>知识点ID（逗号分隔）</label>
                    <input type="text" id="plan-kpids" placeholder="例如：kp1,kp2,kp3">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">创建</button>
            </form>
        </div>
    </div>

    <div class="modal" id="progress-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>更新进度</h3>
                <button class="modal-close" onclick="closeModal('progress-modal')">&times;</button>
            </div>
            <form onsubmit="handleUpdateProgress(event)">
                <input type="hidden" id="progress-plan-id">
                <input type="hidden" id="progress-stage-id">
                <div class="form-group">
                    <label>完成进度（0-100）</label>
                    <input type="range" id="progress-value" min="0" max="100" value="0" oninput="document.getElementById('progress-display').textContent = this.value + '%'">
                    <div style="text-align: center; font-size: 24px; font-weight: bold; color: #0f88eb;" id="progress-display">0%</div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">更新</button>
            </form>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentToken = localStorage.getItem('token');

        function init() {
            loadNacosConfig();
            if (currentToken) {
                checkSession();
            }
        }

        function loadNacosConfig() {
            axios.get('/api/study-plans/nacos-config')
                .then(response => {
                    const config = response.data;
                    document.getElementById('nacos-config').innerHTML = `
                        <p style="font-size: 13px; color: #666; margin-bottom: 8px;">
                            <strong>来源:</strong> ${config.source}
                        </p>
                        <p style="font-size: 13px; color: #666; margin-bottom: 8px;">
                            <strong>每阶段知识点:</strong> ${config.knowledgePointsPerStage}
                        </p>
                        <p style="font-size: 13px; color: #666; margin-bottom: 8px;">
                            <strong>默认学习时长:</strong> ${config.defaultStudyDuration}分钟
                        </p>
                        <p style="font-size: 13px; color: #666;">
                            <strong>欢迎语:</strong> ${config.welcomeMessage}
                        </p>
                    `;
                })
                .catch(error => {
                    document.getElementById('nacos-config').innerHTML = '<p style="color: #ff4d4f;">配置加载失败</p>';
                });
        }

        function checkSession() {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                updateUI();
                loadUserPlans();
            }
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('login-btn').style.display = 'none';
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('user-name').textContent = currentUser.nickname || currentUser.username;
                document.getElementById('user-avatar').textContent = (currentUser.nickname || currentUser.username).charAt(0).toUpperCase();
                
                if (currentUser.guest) {
                    document.getElementById('guest-banner').style.display = 'flex';
                } else {
                    document.getElementById('guest-banner').style.display = 'none';
                }
            } else {
                document.getElementById('login-btn').style.display = 'block';
                document.getElementById('user-info').style.display = 'none';
                document.getElementById('guest-banner').style.display = 'none';
            }
        }

        function showLoginModal() {
            closeModal('register-modal');
            document.getElementById('login-modal').classList.add('show');
        }

        function showRegisterModal() {
            closeModal('login-modal');
            document.getElementById('register-modal').classList.add('show');
        }

        function showCreatePlanModal() {
            if (!currentUser) {
                alert('请先登录');
                showLoginModal();
                return;
            }
            document.getElementById('create-plan-modal').classList.add('show');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            axios.post('/api/users/login', { username, password })
                .then(response => {
                    if (response.data.success) {
                        currentUser = response.data.user;
                        currentToken = response.data.token;
                        localStorage.setItem('token', currentToken);
                        localStorage.setItem('user', JSON.stringify(currentUser));
                        closeModal('login-modal');
                        updateUI();
                        loadUserPlans();
                    } else {
                        alert(response.data.message || '登录失败');
                    }
                })
                .catch(error => {
                    alert('登录失败: ' + error.message);
                });
        }

        function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const nickname = document.getElementById('reg-nickname').value;

            axios.post('/api/users/register', { username, password, nickname })
                .then(response => {
                    if (response.data.success) {
                        alert('注册成功！请登录');
                        closeModal('register-modal');
                        showLoginModal();
                    } else {
                        alert(response.data.message || '注册失败');
                    }
                })
                .catch(error => {
                    alert('注册失败: ' + error.message);
                });
        }

        function guestLogin() {
            axios.post('/api/users/guest')
                .then(response => {
                    if (response.data.success) {
                        currentUser = response.data.user;
                        localStorage.setItem('user', JSON.stringify(currentUser));
                        updateUI();
                        loadUserPlans();
                    }
                })
                .catch(error => {
                    alert('游客登录失败: ' + error.message);
                });
        }

        function logout() {
            currentUser = null;
            currentToken = null;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            updateUI();
            document.getElementById('plans-container').innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">请先登录查看您的学习计划</p>';
            document.getElementById('stat-plans').textContent = '0';
            document.getElementById('stat-progress').textContent = '0%';
            document.getElementById('stat-stages').textContent = '0';
            document.getElementById('stat-time').textContent = '0h';
        }

        function loadUserPlans() {
            if (!currentUser) return;

            axios.get(`/api/study-plans/user/${currentUser.id}`)
                .then(response => {
                    const plans = response.data;
                    renderPlans(plans);
                    updateStats(plans);
                })
                .catch(error => {
                    document.getElementById('plans-container').innerHTML = '<p style="text-align: center; color: #ff4d4f;">加载失败</p>';
                });
        }

        function renderPlans(plans) {
            const container = document.getElementById('plans-container');
            
            if (plans.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">暂无学习计划，点击"新建计划"创建</p>';
                return;
            }

            let html = '';
            plans.forEach(plan => {
                const statusClass = plan.status === 'COMPLETED' ? 'status-completed' : 'status-active';
                const statusText = plan.status === 'COMPLETED' ? '已完成' : '进行中';
                
                html += `
                    <div class="plan-card">
                        <div class="plan-header">
                            <div class="plan-title">${plan.title}</div>
                            <span class="plan-status ${statusClass}">${statusText}</span>
                        </div>
                        <p style="color: #666; font-size: 14px; margin-bottom: 8px;">${plan.description || '暂无描述'}</p>
                        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px;">
                            <div class="progress-bar" style="flex: 1;">
                                <div class="progress-fill" style="width: ${plan.totalProgress}%"></div>
                            </div>
                            <span style="font-size: 14px; font-weight: 500;">${plan.totalProgress}%</span>
                        </div>
                        <div class="stage-list">
                `;
                
                if (plan.stages && plan.stages.length > 0) {
                    plan.stages.forEach(stage => {
                        html += `
                            <div class="stage-item">
                                <div class="stage-progress">
                                    <div class="stage-name">${stage.name}</div>
                                    <div class="progress-bar">
                                        <div class="progress-fill" style="width: ${stage.progress}%"></div>
                                    </div>
                                </div>
                                <span style="font-size: 12px; color: #666; margin-left: 8px;">${stage.progress}%</span>
                                <button class="btn btn-sm btn-secondary" style="margin-left: 8px;" onclick="showProgressModal('${plan.id}', '${stage.stageId}', ${stage.progress})">更新</button>
                            </div>
                        `;
                    });
                }
                
                html += `
                        </div>
                        <div style="margin-top: 12px; display: flex; gap: 8px;">
                            <button class="btn btn-sm btn-primary" onclick="getAIRecommendation('${plan.id}')">AI推荐</button>
                            <button class="btn btn-sm btn-danger" onclick="deletePlan('${plan.id}')">删除</button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        function updateStats(plans) {
            const totalPlans = plans.length;
            let totalProgress = 0;
            let totalStages = 0;
            
            plans.forEach(plan => {
                totalProgress += plan.totalProgress || 0;
                totalStages += (plan.stages || []).length;
            });
            
            const avgProgress = totalPlans > 0 ? Math.round(totalProgress / totalPlans) : 0;
            
            document.getElementById('stat-plans').textContent = totalPlans;
            document.getElementById('stat-progress').textContent = avgProgress + '%';
            document.getElementById('stat-stages').textContent = totalStages;
            
            axios.get(`/api/study-plans/progress/user/${currentUser.id}`)
                .then(response => {
                    const stats = response.data;
                    if (stats.totalStudyTime) {
                        document.getElementById('stat-time').textContent = Math.round(stats.totalStudyTime / 60) + 'h';
                    }
                })
                .catch(() => {});
        }

        function handleCreatePlan(event) {
            event.preventDefault();
            
            const title = document.getElementById('plan-title').value;
            const description = document.getElementById('plan-description').value;
            const kpidsStr = document.getElementById('plan-kpids').value;
            const knowledgePointIds = kpidsStr ? kpidsStr.split(',').map(s => s.trim()) : [];

            axios.post('/api/study-plans', {
                userId: currentUser.id,
                title: title,
                description: description,
                knowledgePointIds: knowledgePointIds
            })
            .then(response => {
                if (response.data.success) {
                    closeModal('create-plan-modal');
                    document.getElementById('plan-title').value = '';
                    document.getElementById('plan-description').value = '';
                    document.getElementById('plan-kpids').value = '';
                    loadUserPlans();
                } else {
                    alert(response.data.message || '创建失败');
                }
            })
            .catch(error => {
                alert('创建失败: ' + error.message);
            });
        }

        function showProgressModal(planId, stageId, currentProgress) {
            document.getElementById('progress-plan-id').value = planId;
            document.getElementById('progress-stage-id').value = stageId;
            document.getElementById('progress-value').value = currentProgress;
            document.getElementById('progress-display').textContent = currentProgress + '%';
            document.getElementById('progress-modal').classList.add('show');
        }

        function handleUpdateProgress(event) {
            event.preventDefault();
            
            const planId = document.getElementById('progress-plan-id').value;
            const stageId = document.getElementById('progress-stage-id').value;
            const progress = parseInt(document.getElementById('progress-value').value);

            axios.put(`/api/study-plans/${planId}/stages/${stageId}/progress`, { progress })
                .then(response => {
                    if (response.data.success) {
                        closeModal('progress-modal');
                        loadUserPlans();
                    } else {
                        alert(response.data.message || '更新失败');
                    }
                })
                .catch(error => {
                    alert('更新失败: ' + error.message);
                });
        }

        function getAIRecommendation(planId) {
            axios.get(`/api/study-plans/${planId}/ai-recommendation?userId=${currentUser.id}`)
                .then(response => {
                    if (response.data.success) {
                        alert('AI推荐:\n\n' + response.data.recommendation);
                    } else {
                        alert(response.data.message || '获取推荐失败');
                    }
                })
                .catch(error => {
                    alert('获取推荐失败: ' + error.message);
                });
        }

        function deletePlan(planId) {
            if (!confirm('确定要删除这个学习计划吗？')) return;
            
            axios.delete(`/api/study-plans/${planId}`)
                .then(response => {
                    if (response.data.success) {
                        loadUserPlans();
                    } else {
                        alert(response.data.message || '删除失败');
                    }
                })
                .catch(error => {
                    alert('删除失败: ' + error.message);
                });
        }

        function refreshPlans() {
            loadNacosConfig();
            if (currentUser) {
                loadUserPlans();
            }
        }

        init();
    </script>
</body>
</html>
