server.port=${SERVER_PORT:8084}

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://mongodb:27017/jellystudy-studyplan}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/jellystudy_users?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

dubbo.protocol.port=${DUBBO_PROTOCOL_PORT:20885}
dubbo.registry.address=${DUBBO_REGISTRY_ADDRESS:nacos://nacos:8848}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

spring.redis.host=${SPRING_REDIS_HOST:host.docker.internal}
spring.redis.port=${SPRING_REDIS_PORT:6379}

spring.zipkin.base-url=${SPRING_ZIPKIN_BASE_URL:http://zipkin:9411/}

spring.cloud.nacos.discovery.server-addr=${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:nacos:8848}
spring.cloud.nacos.config.server-addr=${SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR:nacos:8848}

llm.api-key=${LLM_API_KEY:}
llm.base-url=${LLM_BASE_URL:https://api.minimax.chat/v1/text/chatcompletion_v2}
