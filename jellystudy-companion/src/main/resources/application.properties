server.port=8087
spring.application.name=jellystudy-companion

# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=jellystudy_companion
spring.data.mongodb.auto-index-creation=true

# Dubbo
dubbo.application.name=jellystudy-companion
dubbo.protocol.name=dubbo
dubbo.protocol.port=20887
dubbo.protocol.host=0.0.0.0
dubbo.scan.base-packages=com.jellystudy.companion.dubbo.provider
dubbo.application.qos.enable=false
dubbo.application.qos.port=33336
dubbo.registry.address=nacos://localhost:8848

# Nacos
nacos.logging.path=./logs/nacos
dubbo.metadata-report.address=nacos://localhost:8848

# Redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=6000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=2

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# Zipkin
spring.sleuth.sampler.probability=1.0
spring.zipkin.base-url=http://localhost:9411/
spring.zipkin.discovery-client-enabled=false

# LLM (MiniMax)
llm.provider=minimax
llm.api-key=sk-api-3khG6kGbiuJmzv7F3hmIe0QQd-XMKk3geWuiw2fOKWbIo-Tyrtnb4ZHNQ26iHSS4_NQ3mmyCdtPTCgorgH2vlViWNjw53SnnqtpfJ8vRr5vYrLkaO2fhyVI
