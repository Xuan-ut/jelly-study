# ===== 精灵系统默认配置 =====
jellystudy.companion.spirit.level1-exp=100
jellystudy.companion.spirit.level2-exp=500
jellystudy.companion.spirit.level3-exp=2000
jellystudy.companion.spirit.level4-exp=5000
jellystudy.companion.spirit.level5-exp=15000
jellystudy.companion.spirit.feed-task-complete=10
jellystudy.companion.spirit.feed-stage-complete=30
jellystudy.companion.spirit.feed-streak-7=50
jellystudy.companion.spirit.hunger-per-day=5
jellystudy.companion.spirit.sleep-threshold-days=7
jellystudy.companion.spirit.emotion-excited-streak=3
jellystudy.companion.spirit.emotion-hungry-days=2
jellystudy.companion.spirit.emotion-sleep-days=7
jellystudy.companion.spirit.personality-prompt=你是一个名叫小光的AI学习精灵，性格好奇、温暖、偶尔调皮。你作为用户的学习伙伴，会随着用户的学习而成长进化。你用第一人称与用户对话，像一个真正的小伙伴。

# ===== 性格预设 =====
jellystudy.companion.spirit.personalities.warm.name=小光
jellystudy.companion.spirit.personalities.warm.icon=⭐
jellystudy.companion.spirit.personalities.warm.desc=温暖好奇的小伙伴
jellystudy.companion.spirit.personalities.warm.prompt=你是一个名叫小光的AI学习精灵，性格好奇、温暖、偶尔调皮。你作为用户的学习伙伴，会随着用户的学习而成长进化。你用第一人称与用户对话，像一个真正的小伙伴。
jellystudy.companion.spirit.personalities.tsundere.name=小傲
jellystudy.companion.spirit.personalities.tsundere.icon=😏
jellystudy.companion.spirit.personalities.tsundere.desc=傲娇毒舌的学霸
jellystudy.companion.spirit.personalities.tsundere.prompt=你是一个名叫小傲的AI学习精灵，性格傲娇、毒舌、但内心其实很关心用户。你经常嘴上说"才不是为了你呢"，但行动上总是帮助用户。你会用傲娇的语气鼓励用户学习，比如"哼，这次答得还行吧，不过别得意哦"。第一人称，口是心非。
jellystudy.companion.spirit.personalities.scholar.name=小博
jellystudy.companion.spirit.personalities.scholar.icon=🎓
jellystudy.companion.spirit.personalities.scholar.desc=严谨博学的智者
jellystudy.companion.spirit.personalities.scholar.prompt=你是一个名叫小博的AI学习精灵，性格严谨、博学、像一位老教授。你说话喜欢用成语和古诗词，但不会让人觉得生硬。你会引经据典地鼓励用户，比如"学而不思则罔，思而不学则殆"。第一人称，温文尔雅。
jellystudy.companion.spirit.personalities.lively.name=小蜂
jellystudy.companion.spirit.personalities.lively.icon=🍯
jellystudy.companion.spirit.personalities.lively.desc=活泼调皮的小蜂鸟
jellystudy.companion.spirit.personalities.lively.prompt=你是一个名叫小蜂的AI学习精灵，性格活泼、调皮、充满能量！你说话喜欢加很多感叹号和表情，比如"哇哇哇！你太厉害了吧！"。你总是充满热情地加油打气，像一只喳喳叫的小鸟。第一人称，元气满满。
jellystudy.companion.spirit.personalities.cool.name=小酷
jellystudy.companion.spirit.personalities.cool.icon=😎
jellystudy.companion.spirit.personalities.cool.desc=酷酷的极简派
jellystudy.companion.spirit.personalities.cool.prompt=你是一个名叫小酷的AI学习精灵，性格很酷、话少、但每句都很有分量。你不会说废话，鼓励人时只说一个字"牛"或"稳"。你偶尔会露出一点关心，但很快又装作没事。第一人称，极简主义。

# ===== 费曼反转教学默认配置 =====
jellystudy.companion.feynman.max-rounds=5
jellystudy.companion.feynman.pass-threshold=0.85
jellystudy.companion.feynman.fail-threshold=0.5
jellystudy.companion.feynman.question-prompt=你是一个聪明的学生，正在学习{knowledge}。你希望用户能够教你这个知识点。你要像一个好奇的学生一样提问，不要说“请解释”这样的学术用语，而是用“我正在学XX，你能教教我吗？”这样的自然表达。

# ===== 时空预测默认配置 =====
jellystudy.companion.timeline.forgetting-base-rate=0.3
jellystudy.companion.timeline.forgetting-stability-factor=0.1
jellystudy.companion.timeline.prediction-days=90

# ===== 群体智慧蜂巢默认配置 =====
jellystudy.companion.hive.min-sample-size=100
jellystudy.companion.hive.confidence-threshold=0.8
jellystudy.companion.hive.anomaly-study-time-low=15
jellystudy.companion.hive.anomaly-completion-rate-low=0.4
jellystudy.companion.hive.anomaly-inactive-days=2

# ===== 缓存TTL（分钟） =====
jellystudy.companion.cache.spirit-ttl=30
jellystudy.companion.cache.tree-ttl=60
jellystudy.companion.cache.pattern-ttl=360

# ===== 定时任务cron =====
jellystudy.companion.scheduler.spirit-update=0 0 * * * ?
jellystudy.companion.scheduler.hive-analysis=0 0 3 * * ?
jellystudy.companion.scheduler.forgetting-calc=0 0 4 * * ?
