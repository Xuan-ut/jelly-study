server.port=8081
spring.application.name=jellystudy-knowledge

spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=jellystudy

dubbo.application.name=jellystudy-knowledge
dubbo.protocol.name=dubbo
dubbo.protocol.port=20881
dubbo.protocol.host=0.0.0.0
dubbo.registry.address=nacos://localhost:8848
dubbo.scan.base-packages=com.jellystudy.service
dubbo.application.qos.enable=false
dubbo.application.qos.port=33334
nacos.logging.path=./logs/nacos
dubbo.metadata-report.address=nacos://localhost:8848

spring.sleuth.sampler.probability=1.0
spring.zipkin.base-url=http://localhost:9411/
spring.zipkin.discovery-client-enabled=false

spring.cloud.nacos.discovery.server-addr=localhost:8848
spring.cloud.nacos.config.server-addr=localhost:8848
spring.cloud.nacos.config.file-extension=properties

jellystudy.knowledge.default-page-size=10
jellystudy.knowledge.max-name-length=50
jellystudy.knowledge.auto-create-enabled=true
jellystudy.knowledge.welcome-message=\u6B22\u8FCE\u4F7F\u7528JellyStudy\u77E5\u8BC6\u70B9\u7BA1\u7406
