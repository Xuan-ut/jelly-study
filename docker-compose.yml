version: '3.8'

services:
  jellystudy-knowledge-1:
    build:
      context: ./jellystudy-knowledge
      dockerfile: Dockerfile
    container_name: jellystudy-knowledge-1
    ports:
      - "8081:8081"
      - "20881:20881"
    environment:
      - SERVER_PORT=8081
      - DUBBO_PROTOCOL_PORT=20881
      - DUBBO_APPLICATION_QOS_PORT=33334
      - SPRING_DATA_MONGODB_HOST=host.docker.internal
      - DUBBO_REGISTRY_ADDRESS=nacos://host.docker.internal:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=host.docker.internal:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=host.docker.internal:8848
      - SPRING_ZIPKIN_BASE_URL=http://host.docker.internal:9411/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  jellystudy-knowledge-2:
    build:
      context: ./jellystudy-knowledge
      dockerfile: Dockerfile
    container_name: jellystudy-knowledge-2
    ports:
      - "8091:8091"
      - "20891:20891"
    environment:
      - SERVER_PORT=8091
      - DUBBO_PROTOCOL_PORT=20891
      - DUBBO_APPLICATION_QOS_PORT=33344
      - SPRING_DATA_MONGODB_HOST=host.docker.internal
      - DUBBO_REGISTRY_ADDRESS=nacos://host.docker.internal:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=host.docker.internal:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=host.docker.internal:8848
      - SPRING_ZIPKIN_BASE_URL=http://host.docker.internal:9411/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  jellystudy-studyplan-1:
