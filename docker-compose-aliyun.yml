version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: nacos
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=512m
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=050619
    ports:
      - "8848:8848"
      - "9848:9848"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=050619
      - MYSQL_DATABASE=nacos_config
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.0
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped

  jellystudy-knowledge-1:
    build:
      context: ./jellystudy-knowledge
      dockerfile: Dockerfile
    container_name: jellystudy-knowledge-1
    ports:
      - "8081:8081"
      - "20881:20881"
    environment:
      - SERVER_PORT=8081
      - DUBBO_PROTOCOL_PORT=20881
      - DUBBO_APPLICATION_QOS_PORT=33334
      - SPRING_DATA_MONGODB_HOST=mongodb
      - DUBBO_REGISTRY_ADDRESS=nacos://nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_ZIPKIN_BASE_URL=http://zipkin:9411/
    depends_on:
      - nacos
      - mongodb
    restart: unless-stopped

  jellystudy-knowledge-2:
    build:
      context: ./jellystudy-knowledge
      dockerfile: Dockerfile
    container_name: jellystudy-knowledge-2
    ports:
      - "8091:8091"
      - "20891:20891"
    environment:
      - SERVER_PORT=8091
      - DUBBO_PROTOCOL_PORT=20891
      - DUBBO_APPLICATION_QOS_PORT=33344
      - SPRING_DATA_MONGODB_HOST=mongodb
      - DUBBO_REGISTRY_ADDRESS=nacos://nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_ZIPKIN_BASE_URL=http://zipkin:9411/
    depends_on:
      - nacos
      - mongodb
    restart: unless-stopped

  jellystudy-studyplan-1:
    build:
      context: ./jellystudy-studyplan
      dockerfile: Dockerfile
    container_name: jellystudy-studyplan-1
    ports:
      - "8084:8084"
      - "20885:20885"
    environment:
      - SERVER_PORT=8084
      - DUBBO_PROTOCOL_PORT=20885
      - DUBBO_APPLICATION_QOS_PORT=33354
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/jellystudy-studyplan
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/jellystudy_users?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=050619
      - DUBBO_REGISTRY_ADDRESS=nacos://nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_ZIPKIN_BASE_URL=http://zipkin:9411/
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_REDIS_HOST=redis
    depends_on:
      - nacos
      - mysql
      - mongodb
      - redis
      - rabbitmq
    restart: unless-stopped

  jellystudy-studyplan-2:
    build:
      context: ./jellystudy-studyplan
      dockerfile: Dockerfile
    container_name: jellystudy-studyplan-2
    ports:
      - "8094:8094"
      - "20895:20895"
    environment:
      - SERVER_PORT=8094
      - DUBBO_PROTOCOL_PORT=20895
      - DUBBO_APPLICATION_QOS_PORT=33364
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/jellystudy-studyplan
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/jellystudy_users?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=050619
      - DUBBO_REGISTRY_ADDRESS=nacos://nacos:8848
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR=nacos:8848
      - SPRING_ZIPKIN_BASE_URL=http://zipkin:9411/
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_REDIS_HOST=redis
    depends_on:
      - nacos
      - mysql
      - mongodb
      - redis
      - rabbitmq
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
